<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What I Do - Interactive Skills</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter, Nanum Myeongjo, Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Nanum+Myeongjo:wght@700;800&family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* 배경색을 수직 그라데이션으로 설정 */
            --bg-gradient: linear-gradient(to bottom, #F1F1F1, #9AFFF0);
            --border-color: rgba(0, 0, 0, 0.15); 
            --text-main: #1a1a1a; 
            --accent: #FF8480; 
            --canvas-bg: #FFFEDD; 
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed; 
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            cursor: auto; 
        }

        /* 폰트 유틸리티 */
        .font-myeongjo { font-family: 'Nanum Myeongjo', serif; font-weight: 800; }
        .font-notosans { font-family: 'Noto Sans KR', sans-serif; font-weight: 700; }

        /* 카드 스타일 */
        .skill-card {
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background-color: rgba(255, 255, 255, 0.3); 
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(0, 0, 0, 0.5);
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 1 / 1; 
            position: relative;
            background-color: var(--canvas-bg); 
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .card-footer {
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            text-align: center; /* 가운데 정렬 추가 */
        }
        
        .card-footer h3 {
            font-size: 1.3rem;
            line-height: 1.1;
            font-weight: 800;
            margin: 0 auto; /* 마진 중앙 정렬 */
            text-transform: lowercase; 
            color: #007714;
        }
        
        .canvas-container * {
            pointer-events: none;
        }
    </style>
</head>
<body class="antialiased py-20 px-4 md:px-8 lg:px-12">

    <div class="max-w-[1600px] mx-auto">
        <!-- 상단 타이틀 구역 -->
        <div class="mb-12"></div>

        <!-- 스킬 카드 그리드 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- Card 1: UX -->
            <div class="skill-card">
                <div class="card-header">
                    <span>skill</span>
                    <span>1/3</span>
                </div>
                <div class="canvas-container" id="container-1">
                    <canvas id="canvas-1"></canvas>
                </div>
                <div class="card-footer">
                    <h3>User Experience</h3>
                </div>
            </div>

            <!-- Card 2: Creative Coding -->
            <div class="skill-card">
                <div class="card-header">
                    <span>skill</span>
                    <span>2/3</span>
                </div>
                <div class="canvas-container" id="container-3">
                    <canvas id="canvas-3"></canvas>
                </div>
                <div class="card-footer">
                    <h3>creative</h3>
                </div>
            </div>

            <!-- Card 3: Visual Identity -->
            <div class="skill-card">
                <div class="card-header">
                    <span>skill</span>
                    <span>3/3</span>
                </div>
                <div class="canvas-container" id="container-5">
                    <canvas id="canvas-5"></canvas>
                </div>
                <div class="card-footer">
                    <h3>visual identity</h3>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 캔버스 유틸리티 ---
        function setupCanvas(canvasId, containerId) {
            const canvas = document.getElementById(canvasId);
            const container = document.getElementById(containerId);
            const ctx = canvas.getContext('2d');
            
            let width, height;
            
            function resize() {
                width = container.clientWidth;
                height = container.clientHeight;
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
            }
            
            window.addEventListener('resize', resize);
            resize();
            
            return { canvas, ctx, getWidth: () => width, getHeight: () => height, container };
        }

        // --- Card 1: User Experience (Circles) ---
        (function() {
            const { canvas, ctx, getWidth, getHeight, container } = setupCanvas('canvas-1', 'container-1');
            let circles = [];
            const baseColor = '#FF8480';
            let mouse = { x: -1000, y: -1000 };

            container.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });
            container.addEventListener('mouseleave', () => {
                mouse.x = -1000;
                mouse.y = -1000;
            });

            function init() {
                circles = [];
                for(let i=0; i<15; i++){
                    circles.push({
                        x: Math.random() * getWidth(),
                        y: Math.random() * getHeight(),
                        baseRadius: Math.random() * 40 + 20,
                        radius: 0,
                        targetRadius: Math.random() * 40 + 20,
                        vx: (Math.random() - 0.5) * 1,
                        vy: (Math.random() - 0.5) * 1
                    });
                }
                circles.push({
                    x: getWidth()/2, y: getHeight()/2,
                    baseRadius: 120, radius: 120, targetRadius: 120,
                    vx: 0, vy: 0
                });
            }

            function draw() {
                ctx.clearRect(0, 0, getWidth(), getHeight());
                if(mouse.x > 0 && Math.random() < 0.2) {
                    circles.push({
                        x: mouse.x + (Math.random() - 0.5)*50,
                        y: mouse.y + (Math.random() - 0.5)*50,
                        baseRadius: 5, radius: 0, targetRadius: Math.random()*30 + 10,
                        vx: (Math.random() - 0.5)*2, vy: (Math.random() - 0.5)*2,
                        life: 100
                    });
                }
                ctx.fillStyle = baseColor;
                for (let i = circles.length - 1; i >= 0; i--) {
                    let p = circles[i];
                    p.x += p.vx; p.y += p.vy;
                    let dx = mouse.x - p.x;
                    let dy = mouse.y - p.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 100) {
                        p.targetRadius = p.baseRadius * 0.5;
                        p.x -= dx * 0.05; p.y -= dy * 0.05;
                    } else {
                        p.targetRadius = p.baseRadius;
                    }
                    p.radius += (p.targetRadius - p.radius) * 0.1;
                    if(p.x < 0 || p.x > getWidth()) p.vx *= -1;
                    if(p.y < 0 || p.y > getHeight()) p.vy *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.1, p.radius), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    if (p.life !== undefined) {
                        p.life--;
                        if (p.life <= 0) {
                            p.targetRadius = 0;
                            if(p.radius < 1) circles.splice(i, 1);
                        }
                    }
                }
                requestAnimationFrame(draw);
            }
            init(); draw();
            window.addEventListener('resize', init);
        })();

        // --- Card 2: Creative Coding (Grid) ---
        (function() {
            const { canvas, ctx, getWidth, getHeight, container } = setupCanvas('canvas-3', 'container-3');
            const gridSize = 20;
            let cells = [];
            let cols, rows;
            let mouse = { x: -100, y: -100 };

            function initGrid() {
                cols = Math.ceil(getWidth() / gridSize);
                rows = Math.ceil(getHeight() / gridSize);
                cells = new Array(cols * rows).fill(0);
            }

            container.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
                const cx = Math.floor(mouse.x / gridSize);
                const cy = Math.floor(mouse.y / gridSize);
                const radius = 2;
                for(let y = -radius; y <= radius; y++) {
                    for(let x = -radius; x <= radius; x++) {
                        let nx = cx + x; let ny = cy + y;
                        if(nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                            if(x*x + y*y <= radius*radius) cells[ny * cols + nx] = 1;
                        }
                    }
                }
            });

            function draw() {
                ctx.clearRect(0, 0, getWidth(), getHeight());
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        let idx = y * cols + x;
                        if (cells[idx] > 0) {
                            cells[idx] -= 0.02;
                            if (cells[idx] < 0) cells[idx] = 0;
                        }
                        let val = cells[idx];
                        if (val > 0) {
                            ctx.fillStyle = `rgba(255, 132, 128, ${val})`;
                            ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
                        }
                        ctx.strokeRect(x * gridSize, y * gridSize, gridSize, gridSize);
                    }
                }
                requestAnimationFrame(draw);
            }
            initGrid(); draw();
            window.addEventListener('resize', initGrid);
        })();

        // --- Card 3: Visual Identity (Waves) ---
        (function() {
            const { canvas, ctx, getWidth, getHeight, container } = setupCanvas('canvas-5', 'container-5');
            let mouse = { x: -100, y: -100 };
            const numLines = 15;
            let time = 0;

            container.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });

            function draw() {
                ctx.clearRect(0, 0, getWidth(), getHeight());
                time += 0.05;
                const spacing = getHeight() / numLines;
                const boxWidth = getWidth() / 15;
                ctx.fillStyle = '#FF8480';
                for (let i = 0; i < numLines; i++) {
                    let y = i * spacing + spacing / 2;
                    let dy = mouse.y - y;
                    let influence = Math.max(0, 1 - Math.abs(dy) / 150);
                    for(let j=0; j < 15; j++) {
                        let x = j * boxWidth;
                        let dx = mouse.x - (x + boxWidth/2);
                        let waveInfluence = Math.max(0, 1 - Math.abs(dx) / 150);
                        let offset = Math.sin(time + i*0.5 + j*0.2) * 5;
                        let height = 8 + (influence * waveInfluence * 15) + offset;
                        let width = boxWidth - 4;
                        let drawWidth = width * (1 - (influence * waveInfluence * 0.8));
                        ctx.fillRect(x + 2 + (width - drawWidth)/2, y - height/2, drawWidth, height);
                    }
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>
</html>
